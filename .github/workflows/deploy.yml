name: Deploy Navik → Zone.ee FTP

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build (static export)
        run: npm run build

      - name: Deploy to Zone.ee via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: kargu.ee
          username: d26822f54447
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          local-dir: ./out/
          server-dir: /htdocs/navik/
